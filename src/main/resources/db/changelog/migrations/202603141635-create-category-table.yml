databaseChangeLog:
  - changeSet:
      id: 202603141635
      author: Angélica Martins
      changes:
        - createTable:
            tableName: category
            columns:
              - column:
                  name: category_id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: category_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: default_category
                  type: boolean
              - column:
                  name: created_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
              - column:
                  name: deleted_at
                  type: datetime
