databaseChangeLog:
  - changeSet:
      id: 202603190800
      author: Angélica Martins
      changes:
        - createTable:
            ifNotExists: true
            tableName: expense
            columns:
              - column:
                  name: expense_id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: description
                  type: varchar(200)
              - column:
                  name: value
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  constraints:
                    - nullable: false
              - column:
                  name: updated_at
                  type: datetime
              - column:
                  name: deleted_at
                  type: datetime
              - column:
                  name: category
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_expense_category_id
                    references: category(category_id)
      rollback:
        - delete:
            tableName: expense
