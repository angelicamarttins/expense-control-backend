databaseChangeLog:
  - changeSet:
      id: 202605311030
      author: Angélica Martins
      changes:
        - createTable:
            tableName: users
            ifNotExists: true
            columns:
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(320)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
              - column:
                  name: deleted_at
                  type: datetime
      rollback:
        - dropTable:
            tableName: users
